<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAVA — Milestone Stakeholder Update</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;600&display=swap');

  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #16161f;
    --border: #1e1e2e;
    --border-light: #2a2a3e;
    --text: #e8e8f0;
    --text-muted: #6b6b8a;
    --text-dim: #3a3a52;
    --accent: #5b8dee;
    --accent-dim: #1a2a4a;
    --green: #3dd68c;
    --green-dim: #0d2e1f;
    --amber: #f5a623;
    --amber-dim: #2e1f0a;
    --red: #f04f4f;
    --red-dim: #2e0f0f;
    --purple: #a78bfa;
    --purple-dim: #1e1a3a;
    --gold: #f0c040;
    --gold-dim: #2a1f00;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    min-height: 100vh;
  }

  /* ── HEADER ── */
  .header {
    border-bottom: 1px solid var(--border);
    padding: 20px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    background: rgba(10,10,15,0.97);
    backdrop-filter: blur(12px);
    z-index: 100;
  }

  .logo {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.2em;
    color: var(--text-muted);
    text-transform: uppercase;
  }

  .logo span { color: var(--gold); }

  .header-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  /* ── MILESTONE NAV ── */
  .milestone-nav {
    padding: 0 32px;
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 0;
    overflow-x: auto;
    background: var(--surface);
  }

  .ms-tab {
    padding: 14px 20px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    white-space: nowrap;
    transition: color 0.15s, border-color 0.15s;
    display: flex;
    align-items: center;
    gap: 8px;
    background: none;
    border-top: none;
    border-left: none;
    border-right: none;
  }

  .ms-tab:hover { color: var(--text); }
  .ms-tab.active { color: var(--text); border-bottom-color: var(--gold); }

  .ms-tab-badge {
    font-size: 9px;
    padding: 2px 6px;
    border-radius: 10px;
    font-weight: 700;
  }

  .badge-go { background: var(--green-dim); color: var(--green); }
  .badge-cgo { background: var(--amber-dim); color: var(--amber); }
  .badge-nogo { background: var(--red-dim); color: var(--red); }
  .badge-pending { background: var(--border); color: var(--text-muted); }

  /* ── MAIN ── */
  .main { padding: 40px 48px; max-width: 900px; }

  /* ── UPDATE PAGE ── */
  .update-page { display: none; }
  .update-page.active { display: block; }

  /* ── MILESTONE TITLE BLOCK ── */
  .ms-title-block {
    margin-bottom: 36px;
    padding-bottom: 28px;
    border-bottom: 1px solid var(--border);
  }

  .ms-number {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 10px;
  }

  .ms-title {
    font-size: 30px;
    font-weight: 600;
    line-height: 1.15;
    margin-bottom: 14px;
  }

  .ms-meta-row {
    display: flex;
    gap: 24px;
    flex-wrap: wrap;
    align-items: center;
  }

  .ms-meta-item {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
  }

  .ms-meta-item span { color: var(--text); }

  .decision-pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 16px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 600;
  }

  .pill-go { background: var(--green-dim); color: var(--green); border: 1px solid rgba(61,214,140,0.2); }
  .pill-cgo { background: var(--amber-dim); color: var(--amber); border: 1px solid rgba(245,166,35,0.2); }
  .pill-nogo { background: var(--red-dim); color: var(--red); border: 1px solid rgba(240,79,79,0.2); }
  .pill-pending { background: var(--border); color: var(--text-muted); border: 1px solid var(--border-light); }

  /* ── SUMMARY CARD ── */
  .summary-card {
    background: var(--surface);
    border: 1px solid var(--border-light);
    border-radius: 10px;
    padding: 24px 28px;
    margin-bottom: 28px;
    line-height: 1.85;
    font-size: 15px;
    color: var(--text);
  }

  .summary-card p { margin-bottom: 12px; }
  .summary-card p:last-child { margin-bottom: 0; }

  /* ── STAT ROW ── */
  .stat-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    margin-bottom: 28px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
  }

  .stat-value {
    font-family: 'DM Mono', monospace;
    font-size: 26px;
    font-weight: 500;
    line-height: 1;
    margin-bottom: 6px;
  }

  .stat-label {
    font-size: 11px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  /* ── SECTION ── */
  .section { margin-bottom: 28px; }

  .section-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
  }

  .section-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  /* ── KEY OUTCOMES LIST ── */
  .outcome-list { list-style: none; }

  .outcome-item {
    display: flex;
    gap: 14px;
    align-items: flex-start;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
  }

  .outcome-item:last-child { border-bottom: none; }

  .outcome-icon { font-size: 15px; flex-shrink: 0; margin-top: 1px; }

  .outcome-text { font-size: 14px; line-height: 1.65; color: var(--text); }

  .outcome-sub {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 3px;
  }

  /* ── CONDITIONS (for Conditional Go) ── */
  .condition-item {
    background: var(--amber-dim);
    border: 1px solid rgba(245,166,35,0.2);
    border-radius: 8px;
    padding: 14px 16px;
    margin-bottom: 8px;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 16px;
    align-items: center;
  }

  .condition-text { font-size: 13px; line-height: 1.6; }
  .condition-owner { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--amber); letter-spacing: 0.1em; }

  .condition-status {
    font-size: 11px;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: 4px;
  }

  .cs-open { background: var(--amber-dim); color: var(--amber); border: 1px solid rgba(245,166,35,0.3); }
  .cs-closed { background: var(--green-dim); color: var(--green); border: 1px solid rgba(61,214,140,0.3); }

  /* ── NEXT STEPS ── */
  .next-step-item {
    display: flex;
    gap: 14px;
    align-items: flex-start;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
  }

  .next-step-item:last-child { border-bottom: none; }

  .step-num {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    color: var(--accent);
    min-width: 20px;
    margin-top: 2px;
  }

  .step-text { font-size: 13px; line-height: 1.6; color: var(--text); }
  .step-when { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

  /* ── SIGNATORIES ── */
  .signatory-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
  }

  .signatory-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
  }

  .signatory-role {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 4px;
  }

  .signatory-name { font-size: 13px; font-weight: 500; }

  /* ── PRINT / EXPORT ── */
  .export-btn {
    background: transparent;
    border: 1px solid var(--border-light);
    color: var(--text-muted);
    padding: 8px 16px;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    border-radius: 6px;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s;
  }

  .export-btn:hover { border-color: var(--gold); color: var(--gold); }

  @media print {
    .header, .milestone-nav { display: none; }
    .main { padding: 0; }
    .update-page { display: none !important; }
    .update-page.active { display: block !important; }
  }

  /* ── PROGRESS TIMELINE ── */
  .timeline-track {
    display: flex;
    align-items: center;
    gap: 0;
    margin-bottom: 36px;
    overflow-x: auto;
    padding-bottom: 4px;
  }

  .tl-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
    flex: 1;
    min-width: 90px;
    cursor: pointer;
  }

  .tl-line {
    position: absolute;
    top: 12px;
    left: 50%;
    right: -50%;
    height: 2px;
    background: var(--border);
    z-index: 0;
  }

  .tl-item:last-child .tl-line { display: none; }

  .tl-dot {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    border: 2px solid var(--border-light);
    background: var(--surface);
    z-index: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    transition: border-color 0.2s;
    margin-bottom: 8px;
  }

  .tl-dot.go { border-color: var(--green); background: var(--green-dim); }
  .tl-dot.cgo { border-color: var(--amber); background: var(--amber-dim); }
  .tl-dot.active { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(240,192,64,0.15); }

  .tl-label {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-dim);
    text-align: center;
    line-height: 1.4;
  }

  .tl-item.active .tl-label { color: var(--text-muted); }

  .tl-date {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    color: var(--text-dim);
    margin-top: 3px;
    text-align: center;
  }
</style>
</head>
<body>

<div class="header">

  <div class="header-right">

<nav class="milestone-nav" id="milestone-nav"></nav>

<div class="main" id="main"></div>

document.getElementById('header-date').textContent = new Date().toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });

let activeIdx = 0;

function decisionLabel(d) {
  if (d === 'go') return '✓ Go';
  if (d === 'cgo') return '⚠ Conditional Go';
  if (d === 'nogo') return '✗ No-Go';
  return '— Pending';
}

function decisionPillClass(d) {
  if (d === 'go') return 'pill-go';
  if (d === 'cgo') return 'pill-cgo';
  if (d === 'nogo') return 'pill-nogo';
  return 'pill-pending';
}

function badgeClass(d) {
  if (d === 'go') return 'badge-go';
  if (d === 'cgo') return 'badge-cgo';
  if (d === 'nogo') return 'badge-nogo';
  return 'badge-pending';
}

function badgeLabel(d) {
  if (d === 'go') return 'Go';
  if (d === 'cgo') return 'Cond. Go';
  if (d === 'nogo') return 'No-Go';
  return 'Pending';
}

function dotClass(d) {
  if (d === 'go') return 'go';
  if (d === 'cgo') return 'cgo';
  return '';
}

function buildNav() {
  const nav = document.getElementById('milestone-nav');
  nav.innerHTML = MILESTONES.map((ms, i) => `
    <button class="ms-tab ${i === activeIdx ? 'active' : ''}" onclick="switchTo(${i})">
      ${ms.number.replace('Milestone ', 'M')}
      <span class="ms-tab-badge ${badgeClass(ms.decision)}">${badgeLabel(ms.decision)}</span>
    </button>
  `).join('');
}

function buildTimeline() {
  return `
    <div class="timeline-track">
      ${MILESTONES.map((ms, i) => `
        <div class="tl-item ${i === activeIdx ? 'active' : ''}" onclick="switchTo(${i})">
          <div class="tl-dot ${dotClass(ms.decision)} ${i === activeIdx ? 'active' : ''}">${i === activeIdx ? '●' : ''}</div>
          <div class="tl-line"></div>
          <div class="tl-label">${ms.number.replace('Milestone ', 'M')}</div>
          <div class="tl-date">${ms.date.split(' ').slice(0,2).join(' ')}</div>
        </div>
      `).join('')}
    </div>
  `;
}

function buildPage(ms) {
  const isDesignFreeze = ms.id === 'ms7';

  return `
    ${buildTimeline()}

    <div class="ms-title-block">
      <div class="ms-number">${ms.number} · ${ms.workstream}</div>
      <div class="ms-title">${ms.title}</div>
      <div class="ms-meta-row">
        <div class="decision-pill ${decisionPillClass(ms.decision)}">${decisionLabel(ms.decision)}</div>
        <div class="ms-meta-item">Date: <span>${ms.decisionDate}</span></div>
        <div class="ms-meta-item">Decision by: <span>${ms.decidedBy}</span></div>
      </div>
    </div>

    <div class="stat-row">
      ${ms.stats.map(s => `
        <div class="stat-card">
          <div class="stat-value" style="color:${s.colour}">${s.value}</div>
          <div class="stat-label">${s.label}</div>
        </div>
      `).join('')}
    </div>

    <div class="section">
      <div class="section-header">
        <div class="section-label">Programme Update</div>
      </div>
      <div class="summary-card">
        ${ms.summary.map(p => `<p>${p}</p>`).join('')}
      </div>
    </div>

    <div class="section">
      <div class="section-header">
        <div class="section-label">Key Outcomes</div>
      </div>
      <ul class="outcome-list">
        ${ms.outcomes.map(o => `
          <li class="outcome-item">
            <div class="outcome-icon">${o.icon}</div>
            <div>
              <div class="outcome-text">${o.text}</div>
              <div class="outcome-sub">${o.sub}</div>
            </div>
          </li>
        `).join('')}
      </ul>
    </div>

    ${ms.conditions.length > 0 ? `
    <div class="section">
      <div class="section-header">
        <div class="section-label">⚠ Conditions to Close</div>
      </div>
      ${ms.conditions.map(c => `
        <div class="condition-item">
          <div>
            <div class="condition-text">${c.text}</div>
            <div class="condition-owner">Owner: ${c.owner}</div>
          </div>
          <div class="condition-status ${c.status === 'open' ? 'cs-open' : 'cs-closed'}">
            ${c.status === 'open' ? 'Open' : 'Closed'}
          </div>
        </div>
      `).join('')}
    </div>` : ''}

    <div class="section">
      <div class="section-header">
        <div class="section-label">Next Steps</div>
      </div>
      ${ms.nextSteps.map((s, i) => `
        <div class="next-step-item">
          <div class="step-num">${String(i+1).padStart(2,'0')}</div>
          <div>
            <div class="step-text">${s.text}</div>
            <div class="step-when">${s.when}</div>
          </div>
        </div>
      `).join('')}
    </div>

    <div class="section">
      <div class="section-header">
        <div class="section-label">Gate Signatories</div>
      </div>
      <div class="signatory-grid">
        ${ms.signatories.map(s => `
          <div class="signatory-card">
            <div class="signatory-role">${s.role}</div>
            <div class="signatory-name">${s.name}</div>
          </div>
        `).join('')}
      </div>
    </div>
  `;
}

function switchTo(idx) {
  activeIdx = idx;
  buildNav();
  document.getElementById('main').innerHTML = buildPage(MILESTONES[idx]);
}

// Init
buildNav();
switchTo(0);
</script>
