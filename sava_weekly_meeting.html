<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAVA — Weekly Planning</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;600&display=swap');

  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --border: #1e1e2e;
    --border-light: #2a2a3e;
    --text: #e8e8f0;
    --text-muted: #6b6b8a;
    --text-dim: #3a3a52;
    --accent: #5b8dee;
    --accent-dim: #1a2a4a;
    --green: #3dd68c;
    --green-dim: #0d2e1f;
    --amber: #f5a623;
    --amber-dim: #2e1f0a;
    --red: #f04f4f;
    --red-dim: #2e0f0f;
    --purple: #a78bfa;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    min-height: 100vh;
    padding: 0;
  }

  /* HEADER */
  .header {
    border-bottom: 1px solid var(--border);
    padding: 20px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    background: rgba(10,10,15,0.95);
    backdrop-filter: blur(12px);
    z-index: 100;
  }

  .logo {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.2em;
    color: var(--text-muted);
    text-transform: uppercase;
  }

  .logo span { color: var(--accent); }

  .header-right {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.1em;
  }

  /* CONTROLS */
  .controls {
    padding: 28px 32px;
    border-bottom: 1px solid var(--border);
    display: grid;
    grid-template-columns: 1fr 1fr auto;
    gap: 16px;
    align-items: end;
  }

  .control-group label {
    display: block;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 8px;
  }

  .control-group select,
  .control-group input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border-light);
    color: var(--text);
    padding: 10px 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    border-radius: 6px;
    outline: none;
    cursor: pointer;
    transition: border-color 0.2s;
    appearance: none;
  }

  .control-group select:focus,
  .control-group input:focus {
    border-color: var(--accent);
  }

  .generate-btn {
    background: var(--accent);
    color: white;
    border: none;
    padding: 10px 24px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    border-radius: 6px;
    cursor: pointer;
    letter-spacing: 0.03em;
    transition: opacity 0.2s, transform 0.1s;
    white-space: nowrap;
  }

  .generate-btn:hover { opacity: 0.85; }
  .generate-btn:active { transform: scale(0.98); }

  /* MAIN CONTENT */
  .main { padding: 32px; max-width: 1100px; }

  .week-header {
    display: flex;
    align-items: baseline;
    gap: 16px;
    margin-bottom: 32px;
  }

  .week-title {
    font-size: 22px;
    font-weight: 600;
    color: var(--text);
  }

  .week-subtitle {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.1em;
  }

  /* SECTIONS */
  .section { margin-bottom: 40px; }

  .section-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
  }

  .section-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  .section-count {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 2px 8px;
    border-radius: 10px;
  }

  /* PROJECT CARDS */
  .project-grid { display: grid; gap: 8px; }

  .project-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
    display: grid;
    grid-template-columns: 3fr 1fr 1fr 1fr;
    gap: 12px;
    align-items: center;
    transition: border-color 0.2s;
  }

  .project-card:hover { border-color: var(--border-light); }

  .project-name {
    font-weight: 500;
    font-size: 13px;
    color: var(--text);
  }

  .project-dep {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 3px;
  }

  .project-meta {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
  }

  .status-pill {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    font-weight: 500;
    padding: 3px 10px;
    border-radius: 20px;
    white-space: nowrap;
  }

  .status-done { background: var(--green-dim); color: var(--green); }
  .status-progress { background: var(--accent-dim); color: var(--accent); }
  .status-not-started { background: var(--border); color: var(--text-muted); }
  .status-at-risk { background: var(--red-dim); color: var(--red); }

  .workstream-tag {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--purple);
    background: rgba(167,139,250,0.08);
    border: 1px solid rgba(167,139,250,0.15);
    padding: 2px 8px;
    border-radius: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* MILESTONE CARDS */
  .milestone-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    margin-bottom: 8px;
    display: grid;
    grid-template-columns: 2fr 1fr 1fr 1fr;
    gap: 12px;
    align-items: center;
  }

  .milestone-name {
    font-weight: 600;
    font-size: 13px;
  }

  .milestone-name.design-freeze { color: var(--accent); }

  .days-badge {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 4px;
    text-align: center;
  }

  .days-soon { background: var(--amber-dim); color: var(--amber); }
  .days-upcoming { background: var(--accent-dim); color: var(--accent); }
  .days-past { background: var(--green-dim); color: var(--green); }

  /* AGENDA SECTION */
  .agenda-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

  .agenda-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px;
  }

  .agenda-card h4 {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 14px;
  }

  .agenda-item {
    display: flex;
    gap: 10px;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
    color: var(--text);
  }

  .agenda-item:last-child { border-bottom: none; }

  .agenda-num {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
    padding-top: 2px;
    min-width: 18px;
  }

  .notes-area {
    width: 100%;
    background: transparent;
    border: none;
    color: var(--text-muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    resize: none;
    outline: none;
    line-height: 1.8;
    min-height: 120px;
  }

  .notes-area::placeholder { color: var(--text-dim); }

  /* EMPTY STATE */
  .empty-state {
    text-align: center;
    padding: 48px;
    color: var(--text-dim);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.1em;
  }

  /* PRINT */
  .print-btn {
    background: transparent;
    border: 1px solid var(--border-light);
    color: var(--text-muted);
    padding: 10px 18px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    border-radius: 6px;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s;
  }

  .print-btn:hover { border-color: var(--accent); color: var(--accent); }

  .top-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 32px;
  }

  .stat-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 32px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
  }

  .stat-value {
    font-family: 'DM Mono', monospace;
    font-size: 28px;
    font-weight: 500;
    color: var(--text);
    line-height: 1;
    margin-bottom: 6px;
  }

  .stat-label {
    font-size: 11px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .no-content { display: none; }

  @media print {
    body { background: white; color: black; }
    .controls, .header, .print-btn, .generate-btn { display: none; }
  }
</style>
</head>

  { name: "Manufacturing Pilot Build Complete", workstream: "Manufacturing", target: "2025-06-09", gate: "Go" },
  { name: "DHF & Regulatory Readiness", workstream: "Regulatory & Quality", target: "2025-05-26", gate: "Go" },
  { name: "DESIGN FREEZE", workstream: "All Workstreams", target: "2025-06-27", gate: "Go" },
  { name: "Clinical Trial Readiness", workstream: "Clinical", target: "2025-07-25", gate: "Go" },
];

function parseDate(str) {
  const [y,m,d] = str.split('-').map(Number);
  return new Date(y, m-1, d);
}

function formatDate(date) {
  return date.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
}

function getMonday(date) {
  const d = new Date(date);
  const day = d.getDay();
  const diff = d.getDate() - day + (day === 0 ? -6 : 1);
  d.setDate(diff);
  return d;
}

function statusClass(s) {
  if (s === 'Done') return 'status-done';
  if (s === 'In Progress') return 'status-progress';
  if (s === 'At Risk') return 'status-at-risk';
  return 'status-not-started';
}

function statusDot(s) {
  if (s === 'Done') return '✓';
  if (s === 'In Progress') return '●';
  if (s === 'At Risk') return '▲';
  return '○';
}

// Set today's date and default to nearest Monday
document.getElementById('current-date').textContent = new Date().toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });

const today = new Date();
const monday = getMonday(today);
const pad = n => String(n).padStart(2, '0');
document.getElementById('week-date').value = `${monday.getFullYear()}-${pad(monday.getMonth()+1)}-${pad(monday.getDate())}`;

function generateMeeting() {
  const dateVal = document.getElementById('week-date').value;
  const wsFilter = document.getElementById('workstream-filter').value;

  if (!dateVal) return;

  const weekStart = parseDate(dateVal);
  const weekEnd = new Date(weekStart);
  weekEnd.setDate(weekEnd.getDate() + 6);

  // Filter projects that overlap this week
  let activeProjects = PROJECTS.filter(p => {
    const s = parseDate(p.start);
    const e = parseDate(p.end);
    return s <= weekEnd && e >= weekStart;
  });

  if (wsFilter !== 'all') {
    activeProjects = activeProjects.filter(p => p.workstream === wsFilter);
  }

  // Projects ending this week
  const endingThisWeek = activeProjects.filter(p => {
    const e = parseDate(p.end);
    return e >= weekStart && e <= weekEnd;
  });

  // Projects starting this week
  const startingThisWeek = activeProjects.filter(p => {
    const s = parseDate(p.start);
    return s >= weekStart && s <= weekEnd;
  });

  // Milestones within 4 weeks
  const fourWeeksOut = new Date(weekStart);
  fourWeeksOut.setDate(fourWeeksOut.getDate() + 28);
  let upcomingMilestones = MILESTONES.filter(m => {
    const t = parseDate(m.target);
    return t >= weekStart && t <= fourWeeksOut;
  });
  if (wsFilter !== 'all') {
    upcomingMilestones = upcomingMilestones.filter(m => m.workstream === wsFilter || m.workstream === 'All Workstreams');
  }

  // Stats
  const inProgress = activeProjects.filter(p => p.status === 'In Progress').length;
  const atRisk = activeProjects.filter(p => p.status === 'At Risk').length;
  const done = activeProjects.filter(p => p.status === 'Done').length;

  const wsLabel = wsFilter === 'all' ? 'All Workstreams' : wsFilter;

  let html = `
    <div class="top-bar">
      <div class="week-header">
        <div class="week-title">Week of ${formatDate(weekStart)}</div>
        <div class="week-subtitle">${wsLabel.toUpperCase()} · ${formatDate(weekStart)} → ${formatDate(weekEnd)}</div>
      </div>
    </div>

    <div class="stat-row">
      <div class="stat-card">
        <div class="stat-value">${activeProjects.length}</div>
        <div class="stat-label">Active Projects</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" style="color:var(--accent)">${inProgress}</div>
        <div class="stat-label">In Progress</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" style="color:var(--red)">${atRisk}</div>
        <div class="stat-label">At Risk</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" style="color:var(--amber)">${upcomingMilestones.length}</div>
        <div class="stat-label">Upcoming Gates</div>
      </div>
    </div>
  `;

  // Active projects this week
  html += `
    <div class="section">
      <div class="section-header">
        <div class="section-label">Active This Week</div>
        <div class="section-count">${activeProjects.length}</div>
      </div>
      <div class="project-grid">
  `;

  if (activeProjects.length === 0) {
    html += `<div style="color:var(--text-dim);font-size:13px;padding:16px 0;">No active projects this week for this workstream.</div>`;
  } else {
    activeProjects.forEach(p => {
      const isEnding = endingThisWeek.includes(p);
      const isStarting = startingThisWeek.includes(p);
      const tag = isEnding ? `<span style="font-size:10px;color:var(--amber);font-family:'DM Mono',monospace;margin-left:8px;">ENDS THIS WEEK</span>` :
                  isStarting ? `<span style="font-size:10px;color:var(--green);font-family:'DM Mono',monospace;margin-left:8px;">STARTS THIS WEEK</span>` : '';
      html += `
        <div class="project-card">
          <div>
            <div class="project-name">${p.name}${tag}</div>
            ${p.dependsOn.length > 0 ? `<div class="project-dep">Depends on: ${p.dependsOn.join(', ')}</div>` : ''}
          </div>
          <div class="workstream-tag">${p.workstream.replace('Systems Software & Electronics','SSE').replace('Biology & Chemistry','Bio & Chem').replace('Regulatory & Quality','Reg & Quality')}</div>
          <div class="project-meta">${formatDate(parseDate(p.end))}</div>
          <div><span class="status-pill ${statusClass(p.status)}">${statusDot(p.status)} ${p.status}</span></div>
        </div>
      `;
    });
  }
  html += `</div></div>`;

  // Upcoming milestones
  html += `
    <div class="section">
      <div class="section-header">
        <div class="section-label">Upcoming Gate Decisions</div>
        <div class="section-count">${upcomingMilestones.length} within 4 weeks</div>
      </div>
  `;

  if (upcomingMilestones.length === 0) {
    html += `<div style="color:var(--text-dim);font-size:13px;padding:16px 0;">No gate decisions within the next 4 weeks.</div>`;
  } else {
    upcomingMilestones.forEach(m => {
      const t = parseDate(m.target);
      const daysUntil = Math.round((t - weekStart) / (1000 * 60 * 60 * 24));
      const daysClass = daysUntil <= 7 ? 'days-soon' : daysUntil <= 14 ? 'days-upcoming' : 'days-past';
      const isFreeeze = m.name === 'DESIGN FREEZE';
      html += `
        <div class="milestone-card">
          <div class="milestone-name ${isFreeeze ? 'design-freeze' : ''}">${isFreeeze ? '🔒 ' : ''}${m.name}</div>
          <div class="workstream-tag">${m.workstream.replace('Systems Software & Electronics','SSE').replace('Biology & Chemistry','Bio & Chem').replace('Regulatory & Quality','Reg & Quality')}</div>
          <div class="project-meta">${formatDate(t)}</div>
          <div class="days-badge ${daysClass}">${daysUntil === 0 ? 'THIS WEEK' : `${daysUntil}d away`}</div>
        </div>
      `;
    });
  }
  html += `</div>`;

  // Meeting agenda
  const agendaItems = wsFilter === 'all' ? [
    "Programme RAG status — workstream leads to confirm red/amber items",
    "Critical path update — Biology & Chemistry stability data and Manufacturing yield",
    "Open risks review — any new risks or changes to existing mitigations",
    "Upcoming gate readiness — evidence packs and decision owners confirmed",
    "Decisions required this week — escalations and blockers",
    "Actions from last week — confirm closed or carry forward with owner",
  ] : [
    `${wsFilter} workstream RAG update — leads to confirm status`,
    "Projects ending this week — confirm completion criteria met",
    "Projects at risk — blockers, mitigations, and escalations needed",
    "Dependencies check — anything blocking downstream workstreams",
    "Resource or capacity issues to flag to programme lead",
    "Actions from last week — closed or carried forward",
  ];

  html += `
    <div class="section">
      <div class="section-header">
        <div class="section-label">Meeting Agenda</div>
      </div>
      <div class="agenda-grid">
        <div class="agenda-card">
          <h4>Standing Items</h4>
          ${agendaItems.map((item, i) => `
            <div class="agenda-item">
              <div class="agenda-num">${String(i+1).padStart(2,'0')}</div>
              <div>${item}</div>
            </div>
          `).join('')}
        </div>
        <div class="agenda-card">
          <h4>Notes & Actions</h4>
          <textarea class="notes-area" placeholder="Add meeting notes here...&#10;&#10;Actions:&#10;[ ] Owner — Action&#10;[ ] Owner — Action"></textarea>
        </div>
      </div>
    </div>
  `;

  document.getElementById('output').innerHTML = html;
}
</script>
</body>
</html>
