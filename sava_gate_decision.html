<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAVA — Gate Decision Review</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;600&display=swap');

  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #16161f;
    --border: #1e1e2e;
    --border-light: #2a2a3e;
    --text: #e8e8f0;
    --text-muted: #6b6b8a;
    --text-dim: #3a3a52;
    --accent: #5b8dee;
    --accent-dim: #1a2a4a;
    --green: #3dd68c;
    --green-dim: #0d2e1f;
    --amber: #f5a623;
    --amber-dim: #2e1f0a;
    --red: #f04f4f;
    --red-dim: #2e0f0f;
    --purple: #a78bfa;
    --purple-dim: #1e1a3a;
    --gold: #f0c040;
    --gold-dim: #2a1f00;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    min-height: 100vh;
  }

  .header {
    border-bottom: 1px solid var(--border);
    padding: 20px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    background: rgba(10,10,15,0.95);
    backdrop-filter: blur(12px);
    z-index: 100;
  }

  .logo {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.2em;
    color: var(--text-muted);
    text-transform: uppercase;
  }

  .logo span { color: var(--gold); }

  .controls {
    padding: 28px 32px;
    border-bottom: 1px solid var(--border);
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 16px;
    align-items: end;
  }

  .control-group label {
    display: block;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 8px;
  }

  .control-group select {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border-light);
    color: var(--text);
    padding: 10px 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    border-radius: 6px;
    outline: none;
    cursor: pointer;
    transition: border-color 0.2s;
    appearance: none;
  }

  .control-group select:focus { border-color: var(--gold); }

  .btn-row { display: flex; gap: 8px; }

  .generate-btn {
    background: var(--gold);
    color: #0a0a0f;
    border: none;
    padding: 10px 24px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 700;
    border-radius: 6px;
    cursor: pointer;
    transition: opacity 0.2s;
    white-space: nowrap;
  }

  .generate-btn:hover { opacity: 0.85; }

  .print-btn {
    background: transparent;
    border: 1px solid var(--border-light);
    color: var(--text-muted);
    padding: 10px 18px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    border-radius: 6px;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s;
  }

  .print-btn:hover { border-color: var(--gold); color: var(--gold); }

  .main { padding: 32px; max-width: 1100px; }

  .empty-state {
    text-align: center;
    padding: 64px;
    color: var(--text-dim);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.1em;
  }

  /* GATE HERO */
  .gate-hero {
    background: var(--surface);
    border: 1px solid var(--border-light);
    border-radius: 12px;
    padding: 28px 32px;
    margin-bottom: 32px;
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: center;
    gap: 24px;
  }

  .gate-hero.design-freeze {
    border-color: var(--gold);
    background: linear-gradient(135deg, var(--surface) 60%, var(--gold-dim));
  }

  .gate-type-badge {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 8px;
  }

  .gate-name {
    font-size: 26px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 6px;
  }

  .gate-name.freeze { color: var(--gold); }

  .gate-date {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--text-muted);
  }

  .gate-decision-display {
    text-align: right;
  }

  .decision-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 8px;
  }

  .decision-badge {
    font-size: 18px;
    font-weight: 700;
    padding: 8px 20px;
    border-radius: 8px;
    display: inline-block;
  }

  .decision-go { background: var(--green-dim); color: var(--green); border: 1px solid rgba(61,214,140,0.2); }
  .decision-conditional { background: var(--amber-dim); color: var(--amber); border: 1px solid rgba(245,166,35,0.2); }
  .decision-no-go { background: var(--red-dim); color: var(--red); border: 1px solid rgba(240,79,79,0.2); }
  .decision-pending { background: var(--border); color: var(--text-muted); border: 1px solid var(--border-light); }

  /* STAT ROW */
  .stat-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 32px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
  }

  .stat-value {
    font-family: 'DM Mono', monospace;
    font-size: 28px;
    font-weight: 500;
    line-height: 1;
    margin-bottom: 6px;
  }

  .stat-label {
    font-size: 11px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  /* SECTIONS */
  .section { margin-bottom: 36px; }

  .section-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
  }

  .section-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  .section-count {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 2px 8px;
    border-radius: 10px;
  }

  /* READINESS CRITERIA */
  .criteria-grid { display: grid; gap: 8px; }

  .criteria-row {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
    display: grid;
    grid-template-columns: 24px 1fr auto;
    gap: 12px;
    align-items: center;
    transition: border-color 0.15s;
  }

  .criteria-row:hover { border-color: var(--border-light); }

  .criteria-num {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
  }

  .criteria-text {
    font-size: 13px;
    color: var(--text);
    line-height: 1.5;
  }

  .criteria-check {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    border: 2px solid var(--border-light);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    transition: all 0.15s;
    flex-shrink: 0;
    user-select: none;
  }

  .criteria-check.checked {
    background: var(--green);
    border-color: var(--green);
    color: #0a0a0f;
    font-weight: 700;
  }

  .criteria-check:hover { border-color: var(--green); }

  /* PROJECTS TABLE */
  .projects-table { display: grid; gap: 6px; }

  .project-row {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px 16px;
    display: grid;
    grid-template-columns: 2fr 1fr 1fr 1fr;
    gap: 12px;
    align-items: center;
  }

  .project-name { font-size: 13px; font-weight: 500; }

  .status-pill {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    font-weight: 500;
    padding: 3px 10px;
    border-radius: 20px;
    white-space: nowrap;
  }

  .status-done { background: var(--green-dim); color: var(--green); }
  .status-progress { background: var(--accent-dim); color: var(--accent); }
  .status-not-started { background: var(--border); color: var(--text-muted); }
  .status-at-risk { background: var(--red-dim); color: var(--red); }

  .project-meta {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
  }

  .workstream-tag {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--purple);
    background: rgba(167,139,250,0.08);
    border: 1px solid rgba(167,139,250,0.15);
    padding: 2px 8px;
    border-radius: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* RISKS */
  .risk-row {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px 16px;
    display: grid;
    grid-template-columns: 3fr 1fr 1fr;
    gap: 12px;
    align-items: center;
    margin-bottom: 6px;
  }

  .risk-name { font-size: 13px; color: var(--text); }
  .risk-id { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text-dim); margin-top: 3px; }

  .priority-pill {
    font-size: 11px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 20px;
    text-align: center;
  }

  .p-critical { background: var(--red-dim); color: var(--red); }
  .p-high { background: var(--amber-dim); color: var(--amber); }
  .p-medium { background: var(--accent-dim); color: var(--accent); }
  .p-low { background: var(--green-dim); color: var(--green); }

  /* DECISION PANEL */
  .decision-panel {
    background: var(--surface);
    border: 1px solid var(--border-light);
    border-radius: 12px;
    padding: 24px;
    margin-bottom: 32px;
  }

  .decision-panel h3 {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 20px;
  }

  .decision-options {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    margin-bottom: 20px;
  }

  .decision-option {
    padding: 14px;
    border-radius: 8px;
    border: 2px solid var(--border);
    cursor: pointer;
    text-align: center;
    transition: all 0.15s;
    user-select: none;
  }

  .decision-option:hover { border-color: var(--border-light); }
  .decision-option.selected-go { border-color: var(--green); background: var(--green-dim); }
  .decision-option.selected-conditional { border-color: var(--amber); background: var(--amber-dim); }
  .decision-option.selected-nogo { border-color: var(--red); background: var(--red-dim); }
  .decision-option.selected-deferred { border-color: var(--purple); background: var(--purple-dim); }

  .decision-option-icon { font-size: 20px; margin-bottom: 6px; }
  .decision-option-label { font-size: 12px; font-weight: 600; }
  .decision-option-desc { font-size: 10px; color: var(--text-muted); margin-top: 4px; line-height: 1.4; }

  .decision-fields { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .field-group label {
    display: block;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 6px;
  }

  .field-group input,
  .field-group textarea {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border-light);
    color: var(--text);
    padding: 10px 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    border-radius: 6px;
    outline: none;
    transition: border-color 0.2s;
  }

  .field-group textarea { resize: none; min-height: 80px; line-height: 1.6; }
  .field-group input:focus,
  .field-group textarea:focus { border-color: var(--gold); }

  .progress-bar-wrap {
    background: var(--border);
    border-radius: 4px;
    height: 6px;
    margin-top: 8px;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    border-radius: 4px;
    background: var(--green);
    transition: width 0.3s ease;
  }

  .criteria-progress {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 6px;
  }
</style>
</head>

document.getElementById('header-date').textContent = new Date().toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });

let checkedCriteria = {};

function decisionClass(d) {
  if (d === 'Go') return 'decision-go';
  if (d === 'Conditional Go') return 'decision-conditional';
  if (d === 'No-Go') return 'decision-no-go';
  return 'decision-pending';
}

function statusClass(s) {
  if (s === 'Done') return 'status-done';
  if (s === 'In Progress') return 'status-progress';
  if (s === 'At Risk') return 'status-at-risk';
  return 'status-not-started';
}

function priorityClass(p) {
  if (p >= 15) return 'p-critical';
  if (p >= 10) return 'p-high';
  if (p >= 6) return 'p-medium';
  return 'p-low';
}

function toggleCriteria(gateIdx, criteriaIdx) {
  const key = `${gateIdx}-${criteriaIdx}`;
  checkedCriteria[key] = !checkedCriteria[key];
  const el = document.getElementById(`check-${gateIdx}-${criteriaIdx}`);
  if (checkedCriteria[key]) {
    el.classList.add('checked');
    el.textContent = '✓';
  } else {
    el.classList.remove('checked');
    el.textContent = '';
  }
  updateProgress(gateIdx);
}

function updateProgress(gateIdx) {
  const m = MILESTONES[gateIdx];
  const total = m.criteria.length;
  let checked = 0;
  for (let i = 0; i < total; i++) {
    if (checkedCriteria[`${gateIdx}-${i}`]) checked++;
  }
  const pct = Math.round((checked / total) * 100);
  const fill = document.getElementById(`progress-fill-${gateIdx}`);
  const label = document.getElementById(`progress-label-${gateIdx}`);
  if (fill) fill.style.width = pct + '%';
  if (label) label.textContent = `${checked} of ${total} criteria met`;
}

function generateGate() {
  const idx = document.getElementById('milestone-select').value;
  if (idx === '') return;
  const m = MILESTONES[parseInt(idx)];
  const isFreeze = m.name === 'DESIGN FREEZE';
  const doneProjects = m.projects.filter(p => p.status === 'Done').length;
  const openRisks = m.risks.filter(r => r.status !== 'Closed').length;
  const criticalRisks = m.risks.filter(r => r.priority >= 15 && r.status !== 'Closed').length;

  let html = `
    <div class="gate-hero ${isFreeze ? 'design-freeze' : ''}">
      <div>
        <div class="gate-type-badge">${m.gateType} · ${m.workstream}</div>
        <div class="gate-name ${isFreeze ? 'freeze' : ''}">${isFreeze ? '🔒 ' : ''}${m.name}</div>
        <div class="gate-date">Decision Date: ${m.target} · ${m.decisionBy}</div>
      </div>
      <div class="gate-decision-display">
        <div class="decision-label">Gate Decision</div>
        <div class="decision-badge ${decisionClass(m.decision)}">${m.decision}</div>
      </div>
    </div>

    <div class="stat-row">
      <div class="stat-card">
        <div class="stat-value" style="color:var(--text)">${m.projects.length}</div>
        <div class="stat-label">Required Projects</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" style="color:var(--green)">${doneProjects}</div>
        <div class="stat-label">Complete</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" style="color:${openRisks > 0 ? 'var(--amber)' : 'var(--green)'}">${openRisks}</div>
        <div class="stat-label">Open Risks</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" style="color:${criticalRisks > 0 ? 'var(--red)' : 'var(--green)'}">${criticalRisks}</div>
        <div class="stat-label">Critical Open Risks</div>
      </div>
    </div>

    <div class="section">
      <div class="section-header">
        <div class="section-label">Readiness Criteria</div>
        <div class="section-count">${m.criteria.length} criteria</div>
      </div>
      <div class="criteria-grid">
        ${m.criteria.map((c, i) => `
          <div class="criteria-row">
            <div class="criteria-num">${String(i+1).padStart(2,'0')}</div>
            <div class="criteria-text">${c}</div>
            <div class="criteria-check" id="check-${idx}-${i}" onclick="toggleCriteria(${idx}, ${i})"></div>
          </div>
        `).join('')}
      </div>
      <div class="progress-bar-wrap" style="margin-top:12px;">
        <div class="progress-bar-fill" id="progress-fill-${idx}" style="width:0%"></div>
      </div>
      <div class="criteria-progress" id="progress-label-${idx}">0 of ${m.criteria.length} criteria met</div>
    </div>

    <div class="section">
      <div class="section-header">
        <div class="section-label">Required Projects</div>
        <div class="section-count">${m.projects.length} projects</div>
      </div>
      <div class="projects-table">
        ${m.projects.map(p => `
          <div class="project-row">
            <div class="project-name">${p.name}</div>
            <div class="workstream-tag">${p.workstream}</div>
            <div class="project-meta">${p.end}</div>
            <span class="status-pill ${statusClass(p.status)}">${p.status}</span>
          </div>
        `).join('')}
      </div>
    </div>

    <div class="section">
      <div class="section-header">
        <div class="section-label">Associated Risks</div>
        <div class="section-count">${m.risks.length} risks</div>
      </div>
      ${m.risks.map(r => `
        <div class="risk-row">
          <div>
            <div class="risk-name">${r.name}</div>
            <div class="risk-id">${r.id}</div>
          </div>
          <div class="priority-pill ${priorityClass(r.priority)}">${r.indicator}</div>
          <span class="status-pill ${r.status === 'Closed' ? 'status-done' : r.status === 'Mitigating' ? 'status-progress' : 'status-not-started'}">${r.status}</span>
        </div>
      `).join('')}
    </div>

    <div class="decision-panel">
      <h3>Gate Decision Record</h3>
      <div class="decision-options">
        <div class="decision-option ${m.decision === 'Go' ? 'selected-go' : ''}" onclick="selectDecision(this, 'go')">
          <div class="decision-option-icon">✅</div>
          <div class="decision-option-label">Go</div>
          <div class="decision-option-desc">All criteria met. Programme proceeds.</div>
        </div>
        <div class="decision-option ${m.decision === 'Conditional Go' ? 'selected-conditional' : ''}" onclick="selectDecision(this, 'conditional')">
          <div class="decision-option-icon">⚠️</div>
          <div class="decision-option-label">Conditional Go</div>
          <div class="decision-option-desc">Proceeds with named conditions and owners.</div>
        </div>
        <div class="decision-option ${m.decision === 'No-Go' ? 'selected-nogo' : ''}" onclick="selectDecision(this, 'nogo')">
          <div class="decision-option-icon">🔴</div>
          <div class="decision-option-label">No-Go</div>
          <div class="decision-option-desc">Not ready. Revised date required.</div>
        </div>
        <div class="decision-option" onclick="selectDecision(this, 'deferred')">
          <div class="decision-option-icon">⏸️</div>
          <div class="decision-option-label">Deferred</div>
          <div class="decision-option-desc">Insufficient evidence. Reschedule within 10 days.</div>
        </div>
      </div>
      <div class="decision-fields">
        <div class="field-group">
          <label>Decision Made By</label>
          <input type="text" value="${m.decisionBy}" placeholder="Names and roles..." />
        </div>
        <div class="field-group">
          <label>Decision Date</label>
          <input type="text" value="${m.target}" placeholder="Date of review..." />
        </div>
        <div class="field-group">
          <label>Rationale</label>
          <textarea placeholder="Why was this decision made?">${m.decision === 'Conditional Go' ? 'Conditional go granted. Outstanding items logged with owners and resolution dates. All conditions to be resolved before Design Freeze gate.' : m.decision === 'Go' ? 'All readiness criteria met. No open critical risks. Gate passed unanimously.' : ''}</textarea>
        </div>
        <div class="field-group">
          <label>Conditions / Actions (if applicable)</label>
          <textarea placeholder="List any conditions with owner and resolution date..."></textarea>
        </div>
      </div>
    </div>
  `;

  document.getElementById('output').innerHTML = html;
}

function selectDecision(el, type) {
  const panel = el.closest('.decision-options');
  panel.querySelectorAll('.decision-option').forEach(o => {
    o.className = 'decision-option';
  });
  el.classList.add(`selected-${type}`);
}
</script>
